# Local dev stack for secrets-bridge/api.
#
#   docker compose up --build              # api + postgres + redis
#   curl localhost:8080/healthz
#   curl localhost:8080/readyz             # green once dependencies healthy
#   curl localhost:8080/metrics
#
# For integration tests:
#   docker compose up -d postgres redis
#   export TEST_DATABASE_URL=postgres://secrets_bridge:devpass@localhost:5432/secrets_bridge_test?sslmode=disable
#   export TEST_REDIS_URL=redis://localhost:6379/1
#   go test -count=1 ./pkg/storage/... ./pkg/runtime/...
#
# To exercise the aws-kms backend against LocalStack:
#   docker compose --profile awskms up -d localstack
#   aws --endpoint-url=http://localhost:4566 kms create-key
#   aws --endpoint-url=http://localhost:4566 kms create-alias \
#       --alias-name alias/sb-wrap --target-key-id <key-id>
#   SB_KMS_BACKEND=aws-kms SB_KMS_AWS_REGION=us-east-1 \
#     SB_KMS_AWS_KEY_ID=alias/sb-wrap \
#     SB_KMS_AWS_ENDPOINT=http://localhost:4566 ./api

services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: secrets_bridge
      POSTGRES_PASSWORD: devpass
      POSTGRES_DB: secrets_bridge
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U secrets_bridge -d secrets_bridge"]
      interval: 2s
      timeout: 2s
      retries: 20
    volumes:
      - ./hack/postgres-init.sh:/docker-entrypoint-initdb.d/00-create-test-db.sh:ro

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "no"]
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 2s
      retries: 20

  # LocalStack KMS — opt-in via `--profile awskms`. Lets devs exercise
  # the aws-kms backend without an AWS account.
  localstack:
    profiles: ["awskms"]
    image: localstack/localstack:3
    environment:
      SERVICES: kms
      DEBUG: "0"
    ports:
      - "4566:4566"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:4566/_localstack/health"]
      interval: 2s
      timeout: 2s
      retries: 30

  api:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      API_ADDR: ":8080"
      DATABASE_URL: postgres://secrets_bridge:devpass@postgres:5432/secrets_bridge?sslmode=disable
      REDIS_URL: redis://redis:6379/0
      LOG_LEVEL: info
      # Dev mode unlocks LocalKMS and the 3-user seeder. Default in
      # code is "production" so any forgotten SB_ENV fails closed
      # (LocalKMS rejected at boot).
      SB_ENV: dev
      SB_WRAP_MASTER_KEY: jZgf2iut94A/dHVP85HY4wqkLATXodgs4N3qTDKn9i8=
      # Optional shared password for the 3 dev users. Leave unset for
      # a fresh random password per user, logged ONCE on first boot.
      SB_DEV_SEED_PASSWORD: "${SB_DEV_SEED_PASSWORD:-changeme-dev-only}"
    ports:
      # Host port can be overridden by exporting `API_HOST_PORT`. The
      # container always listens on 8080 internally.
      - "${API_HOST_PORT:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
